name: Simple CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Show Repository Files
      run: |
        echo "📂 Listing files in repo..."
        ls -R

    - name: Validate HTML File
      run: |
        if [ -f picture.html ]; then
          echo "✅ picture.html found"
        else
          echo "❌ picture.html NOT found"
          exit 1
        fi

    - name: Basic HTML Structure Check
      run: |
        echo "🔍 Checking HTML structure..."
        if grep -iq "<html" picture.html; then
          echo "✅ HTML structure looks OK"
        else
          echo "⚠️ Warning: <html> tag not found"
        fi

    - name: Check for Title Tag
      run: |
        if grep -iq "<title>" picture.html; then
          echo "✅ Title tag found"
        else
          echo "⚠️ Warning: No <title> tag found"
        fi

    - name: Check for CSS Usage
      run: |
        if grep -iq "<style" picture.html; then
          echo "✅ CSS detected"
        else
          echo "⚠️ No CSS found"
        fi

    - name: Success Message
      run: echo "🚀 CI Pipeline completed successfully!"
