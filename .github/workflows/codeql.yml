name: CodeQL Scan

on:
  push:
    branches: [ "main" ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL (disable language scan)
      uses: github/codeql-action/init@v3
      with:
        languages: javascript